<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pac-Fire</title>
    <link rel="stylesheet" href="/pacfire/styles.css" />
  </head>
  <body>
    <div class="wrap">
      <h1>Pac-Fire</h1>
      <div class="hud">
        <span id="score">Score: 0</span>
        <span id="high">High: 0</span>
        <span id="lives">Lives: 3</span>
        <button id="musicBtn">Music: On</button>
      </div>
      <canvas id="game" width="832" height="608"></canvas>
      <p class="help">Move: Arrow Keys / WASD • Shoot fireball: Space • Restart: R</p>
    </div>
    <script src="/pacfire/game.js"></script>
  </body>
</html>
